<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>.fun/pr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background: #fff;
      color: #000;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      display: grid;
      place-items: center;
      padding: 32px 16px;
      min-height: 100%;
    }

    .card {
      width: 100%;
      max-width: 440px;
      border: 2px solid #000;
    }

    /* Header */
    .card-header {
      padding: 20px 24px 18px;
      border-bottom: 2px solid #000;
    }

    .card-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      line-height: 1.2;
    }

    .card-header p {
      margin-top: 4px;
      font-size: 12px;
      color: #555;
    }

    /* Sections */
    .section {
      padding: 20px 24px;
      border-bottom: 1px solid #000;
    }

    .section:last-of-type {
      border-bottom: none;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #000;
      margin-bottom: 14px;
    }

    /* Input grid */
    .input-row {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .input-row:last-child { margin-bottom: 0; }

    .input-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
    .input-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .input-row.cols-1 { grid-template-columns: 1fr; }

    .field { display: flex; flex-direction: column; gap: 5px; }

    .field label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: #555;
      text-transform: uppercase;
    }

    .field input[type="number"] {
      width: 100%;
      padding: 9px 11px;
      background: #fff;
      border: 1.5px solid #aaa;
      border-radius: 0;
      font: inherit;
      font-size: 15px;
      font-weight: 500;
      color: #000;
      transition: border-color 80ms;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .field input[type="number"]::-webkit-outer-spin-button,
    .field input[type="number"]::-webkit-inner-spin-button { display: none; }

    .field input[type="number"]:focus {
      outline: none;
      border-color: #000;
    }

    .field input[type="number"]::placeholder { color: #bbb; }

    /* Semifinal display */
    .semifinal-bar {
      margin-top: 14px;
      padding: 10px 12px;
      background: #f5f5f5;
      border: 1.5px solid #000;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .semifinal-bar span:first-child {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: #555;
    }

    .semifinal-bar .value {
      font-size: 16px;
      font-weight: 700;
      color: #000;
      letter-spacing: -0.5px;
    }

    .semifinal-bar .denom {
      font-size: 12px;
      font-weight: 400;
      color: #888;
    }

    /* Track bar */
    .track-wrap {
      margin-top: 8px;
      height: 3px;
      background: #e8e8e8;
      border: 1px solid #ccc;
    }

    .track-fill {
      height: 100%;
      background: #000;
      width: 0%;
      transition: width 200ms ease;
    }

    /* Button */
    .btn-section {
      padding: 0 24px 20px;
    }

    button {
      width: 100%;
      padding: 13px 16px;
      background: #000;
      color: #fff;
      border: 2px solid #000;
      border-radius: 0;
      font: inherit;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 80ms, color 80ms;
    }

    button:hover {
      background: #fff;
      color: #000;
    }

    button:active { opacity: 0.8; }

    /* Result */
    .result {
      margin: 0 24px 20px;
      padding: 16px;
      border: 2px solid #000;
      display: none;
    }

    .result.show { display: block; }

    .result.ok   { border-color: #000; background: #f0faf5; }
    .result.warn { border-color: #000; background: #fffbf0; }
    .result.fail { border-color: #000; background: #fff5f5; }

    .result-headline {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.2px;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .result.ok   .result-headline { color: #065f46; }
    .result.warn .result-headline { color: #92400e; }
    .result.fail .result-headline { color: #991b1b; }

    /* PR progress bar */
    .pr-track-wrap {
      height: 6px;
      background: #e8e8e8;
      border: 1px solid #ccc;
      margin-bottom: 12px;
    }

    .pr-track-fill {
      height: 100%;
      transition: width 300ms ease;
    }

    .result.ok   .pr-track-fill { background: #059669; }
    .result.warn .pr-track-fill { background: #d97706; }
    .result.fail .pr-track-fill { background: #dc2626; }

    .result-rows {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .result-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #444;
    }

    .result-row .val { font-weight: 600; color: #000; }

    .result-tag {
      display: inline-block;
      margin-top: 10px;
      padding: 3px 8px;
      border: 1px solid currentColor;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .result.ok   .result-tag { color: #065f46; }
    .result.warn .result-tag { color: #92400e; }
    .result.fail .result-tag { color: #991b1b; }

    /* Footer */
    .card-footer {
      padding: 14px 24px;
      border-top: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .card-footer a {
      font-size: 11px;
      color: #555;
      text-decoration: none;
      font-weight: 500;
    }

    .card-footer a:hover { color: #000; }

    .card-footer .version {
      font-size: 10px;
      color: #aaa;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    @media (max-width: 480px) {
      body { padding: 0; align-items: flex-start; }

      .card {
        max-width: 100%;
        border-left: none;
        border-right: none;
        border-top: none;
      }

      .input-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

      .field input[type="number"] { font-size: 16px; padding: 11px; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="card-header">
    <h1>Calculadora de PR</h1>
    <p>Descubra quanto precisa tirar na prova de recuperação</p>
  </div>

  <div class="section">
    <div class="section-label">Nota Semifinal</div>
    <div class="input-row cols-3">
      <div class="field">
        <label for="p1">P1 / 3</label>
        <input type="number" id="p1" min="0" max="3" step="0.1" placeholder="0.0" oninput="atualizar()">
      </div>
      <div class="field">
        <label for="p2">P2 / 3</label>
        <input type="number" id="p2" min="0" max="3" step="0.1" placeholder="0.0" oninput="atualizar()">
      </div>
      <div class="field">
        <label for="ti">T.I / 1</label>
        <input type="number" id="ti" min="0" max="1" step="0.1" placeholder="0.0" oninput="atualizar()">
      </div>
    </div>

    <div class="semifinal-bar">
      <span>Semifinal</span>
      <div>
        <span class="value" id="sf-val">0.0</span>
        <span class="denom"> / 7.0</span>
      </div>
    </div>
    <div class="track-wrap">
      <div class="track-fill" id="sf-track"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Pontos Adicionais</div>
    <div class="input-row cols-2">
      <div class="field">
        <label for="tg">T.G / 1.5</label>
        <input type="number" id="tg" min="0" max="1.5" step="0.1" placeholder="0.0">
      </div>
      <div class="field">
        <label for="pic">PIC / 1.5</label>
        <input type="number" id="pic" min="0" max="1.5" step="0.1" placeholder="0.0">
      </div>
    </div>
    <div class="input-row cols-1">
      <div class="field">
        <label for="pe">P.E — Ponto Extra / 0.5</label>
        <input type="number" id="pe" min="0" max="0.5" step="0.1" placeholder="0.0">
      </div>
    </div>
  </div>

  <div class="btn-section">
    <button onclick="calcular()">Calcular →</button>
  </div>

  <div id="resultado" class="result"></div>

  <div class="card-footer">
    <a href="https://www.instagram.com/escobarpython/">@escobarpython</a>
    <span class="version">v5 — jun 2026</span>
  </div>

</div>

<script>
function atualizar() {
  const p1 = parseFloat(document.getElementById('p1').value) || 0;
  const p2 = parseFloat(document.getElementById('p2').value) || 0;
  const ti = parseFloat(document.getElementById('ti').value) || 0;
  const sf = p1 + p2 + ti;
  document.getElementById('sf-val').textContent = sf.toFixed(1);
  document.getElementById('sf-track').style.width = Math.min(sf / 7 * 100, 100) + '%';
}

function calcular() {
  const p1  = parseFloat(document.getElementById('p1').value)  || 0;
  const p2  = parseFloat(document.getElementById('p2').value)  || 0;
  const ti  = parseFloat(document.getElementById('ti').value)  || 0;
  const tg  = parseFloat(document.getElementById('tg').value)  || 0;
  const pic = parseFloat(document.getElementById('pic').value) || 0;
  const pe  = parseFloat(document.getElementById('pe').value)  || 0;

  const res = document.getElementById('resultado');

  if (p1 > 3 || p2 > 3 || ti > 1 || tg > 1.5 || pic > 1.5 || pe > 0.5 ||
      [p1,p2,ti,tg,pic,pe].some(v => v < 0)) {
    res.className = 'result show fail';
    res.innerHTML = `
      <div class="result-headline">Valores fora dos limites</div>
      <div class="result-rows">
        <div class="result-row">Verifique os campos e tente novamente.</div>
      </div>`;
    return;
  }

  const semifinal  = p1 + p2 + ti;
  const extras     = tg + pic + pe;
  const notaAtual  = semifinal + extras;

  if (notaAtual >= 7.0) {
    res.className = 'result show ok';
    res.innerHTML = `
      <div class="pr-track-wrap"><div class="pr-track-fill" style="width:100%"></div></div>
      <div class="result-headline">Aprovado — sem precisar da PR</div>
      <div class="result-rows">
        <div class="result-row"><span>Semifinal (P1+P2+T.I)</span><span class="val">${semifinal.toFixed(2)} / 7</span></div>
        <div class="result-row"><span>Adicionais (T.G+PIC+P.E)</span><span class="val">+${extras.toFixed(2)}</span></div>
        <div class="result-row"><span>Nota final</span><span class="val">${notaAtual.toFixed(2)}</span></div>
      </div>
      <span class="result-tag">Parabéns</span>`;
    return;
  }

  // PR = 2 × (7.0 − extras) − semifinal
  const pr = 2 * (7.0 - extras) - semifinal;

  if (pr > 7) {
    const pct = Math.min(pr / 7 * 100, 100);
    res.className = 'result show fail';
    res.innerHTML = `
      <div class="pr-track-wrap"><div class="pr-track-fill" style="width:${pct}%"></div></div>
      <div class="result-headline">Impossível fechar 7.0 — precisaria de ${pr.toFixed(2)} na PR</div>
      <div class="result-rows">
        <div class="result-row"><span>Semifinal (P1+P2+T.I)</span><span class="val">${semifinal.toFixed(2)} / 7</span></div>
        <div class="result-row"><span>Adicionais (T.G+PIC+P.E)</span><span class="val">+${extras.toFixed(2)}</span></div>
        <div class="result-row"><span>PR máxima possível</span><span class="val">7.0</span></div>
      </div>
      <span class="result-tag">Reprovado</span>`;
    return;
  }

  const pct = Math.round(pr / 7 * 100);
  const hard = pr <= 3 ? 'ok' : pr <= 5.5 ? 'warn' : 'fail';
  const tag  = pr <= 3 ? 'Tranquilo' : pr <= 5.5 ? 'Atenção' : 'Difícil';

  res.className = `result show ${hard}`;
  res.innerHTML = `
    <div class="pr-track-wrap"><div class="pr-track-fill" style="width:${pct}%"></div></div>
    <div class="result-headline">Precisa de <strong>${pr.toFixed(2)}</strong> na PR (máx. 7.0)</div>
    <div class="result-rows">
      <div class="result-row"><span>Semifinal (P1+P2+T.I)</span><span class="val">${semifinal.toFixed(2)} / 7</span></div>
      <div class="result-row"><span>Adicionais (T.G+PIC+P.E)</span><span class="val">+${extras.toFixed(2)}</span></div>
      <div class="result-row"><span>Nota após PR</span><span class="val">7.00</span></div>
    </div>
    <span class="result-tag">${tag}</span>`;
}
</script>

</body>
</html>
